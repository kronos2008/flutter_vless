workflows:
  vless-workflow:
    name: Build VLESS APK
    max_build_duration: 30
    environment:
      vars:
        CM_BUILD_NUMBER: $BUILD_NUMBER
    scripts:
      # Делаем скрипт сборки исполняемым
      - chmod +x gradlew
      # Собираем отладочную версию APK (ту, что нам нужна)
      - ./gradlew assembleDebug
    artifacts:
      # Говорим CodeMagic, где искать готовый файл
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - washingtonfizcl@gmail.com  # ЗАМЕНИ НА СВОЙ EMAIL!
