workflows:
  viess-workflow:
    name: Build VLESS APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - flutter clean
      - flutter pub get
      - cd example && flutter build apk --debug
    artifacts:
      - example/build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - washingtonfizcl@gmail.com
